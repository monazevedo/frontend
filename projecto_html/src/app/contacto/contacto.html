<h1>📞 Contacto</h1>

<form (ngSubmit)="enviar()">
    <div>
        <label>Nome:</label>
        <input type="text" [(ngModel)]="nome" name="nome">
    </div>
    
    <div>
        <label>Email:</label>
        <input type="email" [(ngModel)]="email" name="email">
    </div>
    
    <div>
        <label>Senha:</label>
        <input type="password" [(ngModel)]="senha" name="senha">
    </div>
    
    <button type="submit">Enviar</button>
</form>
