<h3>tags para renderizar videos</h3>
<p>Iframe é a nossa tag</p>

<div class="video">
  <iframe
    width="800"
    height="450"
    src="https://www.youtube.com/embed/-qyLHHZECE4"
    title="Imagens de teste"
    frameborder="0"
    allow="
      accelerometer;
      autoplay;
      clipboard-write;
      encrypted-media;
      gyroscope;
      picture-in-picture;
      web-share;
    "
    allowfullscreen
  >
  </iframe>
</div>
